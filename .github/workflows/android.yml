name: Android Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.2
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.2"

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace --warning-mode all

      - name: Build release APK
        run: gradle assembleRelease --stacktrace --warning-mode all

      - name: Show built APK files
        run: |
          echo "Debug outputs:"
          find app/build/outputs/apk/debug -type f || true
          echo "Release outputs:"
          find app/build/outputs/apk/release -type f || true

      - name: Rename APKs for release
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/debug/*.apk release-assets/PocketMine-Runner-debug-${GITHUB_REF_NAME}.apk
          cp app/build/outputs/apk/release/*.apk release-assets/PocketMine-Runner-release-${GITHUB_REF_NAME}.apk
          ls -la release-assets

      - name: Publish APKs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
