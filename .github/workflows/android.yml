name: Build and Release Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release, for example v1.0.5"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.2
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.2"

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace --warning-mode all

      - name: Prepare release files
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/debug/*.apk "release-assets/PocketMineRunner-${{ github.event.inputs.version }}.apk"
          ls -la release-assets

      - name: Create or update tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ github.event.inputs.version }}"
          git push origin "refs/tags/${{ github.event.inputs.version }}" --force

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: release-assets/*.apk
          generate_release_notes: true
