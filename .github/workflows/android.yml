name: Android Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish, e.g. v1.0.4"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.2
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.2"

      - name: Resolve tag name
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${{ github.event.inputs.tag_name }}" >> $GITHUB_ENV
          fi

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace --warning-mode all

      - name: Build release APK
        run: gradle assembleRelease --stacktrace --warning-mode all

      - name: Prepare release files
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/debug/*.apk "release-assets/PocketMine-Runner-debug-${RELEASE_TAG}.apk"
          cp app/build/outputs/apk/release/*.apk "release-assets/PocketMine-Runner-release-${RELEASE_TAG}.apk"
          ls -la release-assets

      - name: Publish APKs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release-assets/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
